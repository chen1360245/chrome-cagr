<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#3B82F6" opacity="0.1"/>

  <!-- Main Circle Border -->
  <circle cx="100" cy="100" r="90" stroke="#3B82F6" stroke-width="3" fill="none"/>

  <!-- Growth Curve Path -->
  <path d="M 50 140 Q 70 120, 90 100 T 130 60 L 150 40"
        stroke="#3B82F6"
        stroke-width="5"
        fill="none"
        stroke-linecap="round"/>

  <!-- Arrow Head -->
  <path d="M 150 40 L 140 45 L 145 50 Z" fill="#3B82F6"/>

  <!-- Data Points -->
  <circle cx="50" cy="140" r="6" fill="#3B82F6"/>
  <circle cx="90" cy="100" r="6" fill="#3B82F6"/>
  <circle cx="130" cy="60" r="6" fill="#3B82F6"/>

  <!-- Percentage Symbol -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#3B82F6" text-anchor="middle">%</text>
</svg>
